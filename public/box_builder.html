<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>إنشاء باقة جديدة - سلة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.salla.network/fonts/sallaicons.css"/>
    
    <style>
        /* ==================== أيقونات سلة ==================== */
        .s-icon { 
    font-family: 'sallaicons' !important; 
    font-style: normal; 
    vertical-align: middle;
}
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--gray-50);
            margin-bottom: 12px;
        }

        .upload-area:hover {
            border-color: var(--primary-teal);
            background: var(--primary-teal-light);
        }

        .upload-area.has-file {
            border-color: var(--primary-teal);
            background: var(--primary-teal-light);
            padding: 0;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .upload-area.has-file img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .upload-area.has-file .upload-content {
            display: none;
        }

        .upload-icon {
            font-size: 48px;
            color: var(--text-light);
            margin-bottom: 12px;
        }

        .upload-area h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .upload-area p {
            font-size: 12px;
            color: var(--text-light);
            margin: 0;
        }

        .preview-package-image {
            width: 100%;
            height: 200px;
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 16px;
            background: var(--gray-100);
            display: none;
        }

        .preview-package-image.visible {
            display: block;
        }

        :root {
    --primary-teal: #62D0B6;      
    --accent-teal: #00b894;        
    --primary-teal-hover: #00363f;
    --primary-teal-light: #e6f7f4;
    --text-dark: #333333;
    --text-medium: #666666;
    --text-light: #999999;
    --gray-50: #fcfcfc;
    --gray-100: #f5f5f5;
    --border-color: #eeeeee;
    --white: #ffffff;
    --red: #ff5f5f;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
}

        /* ==================== إعادة تعيين ==================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--gray-50);
            color: var(--text-dark);
            font-size: 14px;
            line-height: 1.6;
            padding-bottom: 100px;
        }

        /* ==================== التخطيط الأساسي ==================== */
        .container {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            gap: 24px;
            padding: 24px;
            align-items: flex-start;
        }

        .main-content {
            flex: 1;
            min-width: 0;
        }

        .sidebar {
            width: 380px;
            flex-shrink: 0;
            position: sticky;
            top: 24px;
        }

        /* ==================== البطاقات ==================== */
        .card {
            background: var(--white);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 16px;
            overflow: hidden;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--white);
        }

        .card-header h3 {
            margin: 0;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .card-body {
            padding: 20px;
        }

        /* ==================== معاينة الباقة ==================== */
        .preview-card {
            background: var(--white);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            padding: 20px;
        }

        .preview-header {
            text-align: center;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 16px;
        }

        .preview-label {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 4px;
        }

        .preview-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
            min-height: 27px;
        }

        .preview-price {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-teal);
            min-height: 30px;
        }

        .preview-elements {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .preview-element {
            background: var(--gray-50);
            border-radius: 6px;
            padding: 12px;
            border: 1px solid var(--border-color);
        }

        .preview-element-header {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .preview-element-number {
            background: var(--primary-teal);
            color: var(--white);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }

        .preview-products {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .preview-product {
            font-size: 12px;
            color: var(--text-medium);
            padding: 6px 10px;
            background: var(--white);
            border-radius: 4px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .preview-product-image {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            object-fit: cover;
            background: var(--gray-100);
        }

        .preview-product-details {
            flex: 1;
            min-width: 0;
        }

        .preview-product-name {
            font-weight: 500;
            color: var(--text-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .preview-product-price {
            font-size: 11px;
            color: var(--primary-teal);
        }

        /* ==================== حقول الإدخال ==================== */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            transition: all 0.2s;
            background: var(--white);
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--primary-teal);
            box-shadow: 0 0 0 3px var(--primary-teal-light);
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .checkbox-input {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-teal);
            cursor: pointer;
        }

        .checkbox-label {
            font-size: 13px;
            color: var(--text-dark);
            cursor: pointer;
        }

        /* ==================== الأزرار ==================== */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .btn-primary {
            background: var(--primary-teal);
            color: var(--white);
        }

        .btn-primary:hover {
            background: var(--primary-teal-hover);
        }

        .btn-secondary {
            background: var(--gray-100);
            color: var(--text-dark);
        }

        .btn-secondary:hover {
            background: var(--gray-50);
            border-color: var(--border-color);
        }

        .btn-danger {
            background: var(--red);
            color: var(--white);
        }

        .btn-full {
            width: 100%;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ==================== بطاقة العنصر ==================== */
        .element-card {
            background: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .element-header {
            background: var(--gray-50);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid var(--border-color);
        }

        .element-header:hover {
            background: var(--gray-100);
        }

        .element-number {
            background: var(--primary-teal);
            color: var(--white);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .element-title {
            flex: 1;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .element-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .element-collapse-icon {
            font-size: 18px;
            color: var(--text-light);
            transition: transform 0.2s;
        }

        .element-header.collapsed .element-collapse-icon {
            transform: rotate(-90deg);
        }

        .element-body {
            padding: 16px;
            max-height: 1000px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .element-body.collapsed {
            max-height: 0;
            padding: 0 16px;
        }

        .element-name-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .element-name-input:focus {
            outline: none;
            border-color: var(--primary-teal);
            box-shadow: 0 0 0 3px var(--primary-teal-light);
        }

        /* ==================== قائمة المنتجات ==================== */
        .products-list {
            margin-bottom: 16px;
        }

        .product-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--gray-50);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .product-image {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            object-fit: cover;
            background: var(--gray-100);
            flex-shrink: 0;
        }

        .product-details {
            flex: 1;
            min-width: 0;
        }

        .product-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .product-price {
            font-size: 12px;
            color: var(--primary-teal);
            font-weight: 600;
        }

        .product-remove {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--red);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .product-remove:hover {
            transform: scale(1.1);
        }

        /* ==================== محدد المنتج ==================== */
        .product-selector {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            background: var(--white);
        }

        .selector-header {
            padding: 12px;
            background: var(--gray-50);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .selector-header .s-icon {
            font-size: 16px;
            color: var(--text-light);
        }

        .selector-search {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
        }

        .selector-search:focus {
            outline: none;
            border-color: var(--primary-teal);
        }

        .selector-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .selector-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
        }

        .selector-item:hover {
            background: var(--gray-50);
        }

        .selector-item:last-child {
            border-bottom: none;
        }

        .selector-item-image {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            object-fit: cover;
            background: var(--gray-100);
        }

        .selector-item-details {
            flex: 1;
            min-width: 0;
        }

        .selector-item-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .selector-item-price {
            font-size: 12px;
            color: var(--primary-teal);
            font-weight: 600;
        }

        .selector-item-add {
            padding: 6px 12px;
            background: var(--primary-teal);
            color: var(--white);
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .selector-item-add:hover {
            background: var(--primary-teal-hover);
        }

        /* ==================== التذييل الثابت ==================== */
        .fixed-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            border-top: 1px solid var(--border-color);
            padding: 16px 24px;
            display: flex;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .fixed-footer .btn {
            min-width: 160px;
        }

        /* ==================== استجابة الموبايل ==================== */
        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                position: static;
                order: -1;
            }

            .fixed-footer {
                flex-direction: column;
                gap: 8px;
            }

            .fixed-footer .btn {
                width: 100%;
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 16px;
            }

            .card-body {
                padding: 16px;
            }

            .element-header {
                padding: 12px;
            }

            .element-body {
                padding: 12px;
            }

            .preview-card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- المحتوى الرئيسي -->
        <div class="main-content">
            <!-- معلومات الباقة الأساسية -->
            <div class="card">
                <div class="card-header">
                    <h3><i class="s-icon sicon-box-bankers"></i> معلومات الباقة</h3>
                </div>
                <div class="card-body">
                    <!-- رفع صورة الباقة -->
                    <div class="form-group">
                        <label class="form-label">صورة الباقة</label>
                        <div class="upload-area" id="upload-area" onclick="document.getElementById('package-image-input').click()">
                            <div class="upload-content">
                                <div class="upload-icon">
                                    <i class="s-icon sicon-image" style="font-size: 48px; color: var(--text-light);"></i>
                                </div>
                                <h4>اضغط لرفع صورة الباقة</h4>
                                <p>PNG, JPG أو GIF (الحد الأقصى 2MB)</p>
                            </div>
                        </div>
                        <input type="file" id="package-image-input" accept="image/*" style="display: none;" onchange="handlePackageImageUpload(event)">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="package-name">اسم الباقة</label>
                        <input type="text" id="package-name" class="form-input" placeholder="مثال: باقة العناية الشاملة" oninput="updatePreview()">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="package-price">سعر الباقة (﷼)</label>
                        <input type="number" id="package-price" class="form-input" placeholder="0.00" step="0.01" min="0" oninput="updatePreview()">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="package-description">وصف الباقة (اختياري)</label>
                        <textarea id="package-description" class="form-textarea" placeholder="أضف وصفاً للباقة..."></textarea>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="package-active" class="checkbox-input" checked>
                        <label for="package-active" class="checkbox-label">الباقة نشطة</label>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="package-featured" class="checkbox-input">
                        <label for="package-featured" class="checkbox-label">باقة مميزة</label>
                    </div>
                </div>
            </div>

            <!-- عناصر الباقة -->
            <div class="card">
                <div class="card-header">
                    <h3><i class="s-icon sicon-list"></i> عناصر الباقة</h3>
                    <button class="btn btn-primary" onclick="addNewElement()">
                        <i class="s-icon sicon-plus"></i>
                        إضافة عنصر
                    </button>
                </div>
                <div class="card-body" id="elements-container">
                    <div style="text-align: center; color: var(--text-light); padding: 40px 20px;">
                        <i class="s-icon sicon-inbox" style="font-size: 48px; opacity: 0.3; display: block; margin-bottom: 12px;"></i>
                        <p>لم يتم إضافة أي عناصر بعد</p>
                        <p style="font-size: 12px; margin-top: 4px;">ابدأ بإضافة عنصر جديد للباقة</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- الشريط الجانبي -->
        <div class="sidebar">
            <div class="preview-card">
                <div class="preview-header">
                    <div class="preview-label"><i class="s-icon sicon-eye"></i> معاينة الباقة</div>
                    <img id="preview-package-image" class="preview-package-image" alt="صورة الباقة">
                    <div class="preview-title" id="preview-title">اسم الباقة</div>
                    <div class="preview-price" id="preview-price">﷼ 0.00</div>
                </div>
                <div class="preview-elements" id="preview-elements">
                    <div style="text-align: center; color: var(--text-light); padding: 20px; font-size: 12px;">
                        قم بإضافة عناصر للباقة لمشاهدة المعاينة
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- التذييل الثابت -->
    <div class="fixed-footer">
        <button class="btn btn-secondary" onclick="previewPackage()">
            <i class="s-icon sicon-eye"></i>
            معاينة كاملة
        </button>
        <button class="btn btn-primary" onclick="savePackage()">
            <i class="s-icon sicon-save"></i>
            حفظ الباقة
        </button>
    </div>

    <script>
        let packageElements = [];
        let elementCounter = 0;
        let packageImageUrl = null;

        // المتغير الذي سيحمل بيانات المنتجات من قاعدة البيانات
        let availableProducts = [];

        // دالة جلب المنتجات من Laravel API
        // دالة جلب المنتجات من Laravel API
        // هذه الدالة تجلب جميع المنتجات من جميع الصفحات
   async function fetchProducts() {
    try {
        let allProducts = [];
        let currentPage = 1;
        let hasMorePages = true;

        while (hasMorePages) {
            // Fetch the specific page from Laravel
            const response = await fetch(`http://127.0.0.1:8000/api/products?page=${currentPage}`, {
                headers: { 'Accept': 'application/json' }
            });

            if (!response.ok) throw new Error('فشل الاتصال بالسيرفر');

            const result = await response.json();
            
            // 1. Access the 'data' array provided by Laravel's paginator
            const products = result.data.map(product => ({
                id: product.id,
                name: product.name,
                price: parseFloat(product.price),
                image: product.image_url || 'https://via.placeholder.com/150' // Use image_url
            }));
            
            allProducts = [...allProducts, ...products];

            // 2. Check Laravel's 'meta' to see if there's a next page
            if (result.meta && result.current_page < result.last_page) {
                currentPage++;
            } else if (result.next_page_url) { // Standard Laravel pagination key
                currentPage++;
            } else {
                hasMorePages = false;
            }

            // Safety break
            if (currentPage > 500) break;
        }

        availableProducts = allProducts;
        console.log(`✅ تم تحميل ${availableProducts.length} منتج من جميع الصفحات`);

    } catch (error) {
        console.error("❌ خطأ:", error);
        alert("تنبيه: فشل جلب المنتجات.");
    }
}

        window.addEventListener('DOMContentLoaded', fetchProducts);

        function handlePackageImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                if (file.size > 2 * 1024 * 1024) {
                    alert('حجم الملف كبير جداً. الحد الأقصى 2MB');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    packageImageUrl = e.target.result;
                    const uploadArea = document.getElementById('upload-area');
                    uploadArea.classList.add('has-file');
                    uploadArea.innerHTML = `<img src="${packageImageUrl}" alt="صورة الباقة">`;
                    updatePreview();
                };
                reader.readAsDataURL(file);
            }
        }

        function addNewElement() {
            const elementId = `element-${++elementCounter}`;
            const elementIndex = packageElements.length;

            packageElements.push({
                id: elementId,
                name: '',
                products: []
            });

            const container = document.getElementById('elements-container');
            
            if (container.querySelector('div[style*="text-align: center"]')) {
                container.innerHTML = '';
            }

            const elementHTML = `
                <div class="element-card" id="${elementId}" data-element-index="${elementIndex}">
                    <div class="element-header" onclick="toggleCollapsible(this)">
                        <div class="element-number">${elementIndex + 1}</div>
                        <div class="element-title">العنصر ${elementIndex + 1}</div>
                        <div class="element-actions">
                            <button class="btn btn-danger" style="padding: 6px 12px; font-size: 12px;" onclick="event.stopPropagation(); removeElement('${elementId}', ${elementIndex})">
                                <i class="s-icon sicon-trash"></i>
                            </button>
                            <i class="s-icon sicon-keyboard_arrow_down element-collapse-icon"></i>
                        </div>
                    </div>
                    <div class="element-body">
                        <div class="form-group">
                            <label class="form-label">اسم العنصر</label>
                            <input type="text" class="element-name-input" placeholder="مثال: اختر نوع الشامبو" oninput="updateElementName(${elementIndex}, this.value)">
                        </div>

                        <div class="products-list" id="products-list-${elementId}">
                            <div style="text-align: center; color: var(--text-light); padding: 20px; font-size: 13px;">
                                لم يتم إضافة منتجات بعد
                            </div>
                        </div>

                        <div class="product-selector" id="selector-${elementId}">
                            <div class="selector-header">
                                <i class="s-icon sicon-search"></i>
                                <input type="text" class="selector-search" placeholder="ابحث عن منتج..." oninput="filterProducts('${elementId}', this.value)">
                            </div>
                            <div class="selector-list" id="available-products-${elementId}">
                                ${renderAvailableProducts(elementId, elementIndex)}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            container.insertAdjacentHTML('beforeend', elementHTML);
            updatePreview();
        }

        // دالة عرض المنتجات في القائمة المنسدلة
        function renderAvailableProducts(elementId, elementIndex, filterText = '') {
            // تصفية المنتجات حسب نص البحث
            let productsToShow = availableProducts;
            if (filterText) {
                productsToShow = availableProducts.filter(p => 
                    p.name.includes(filterText)
                );
            }

            if (productsToShow.length === 0) {
                if (availableProducts.length === 0) {
                    return '<div style="padding:10px; text-align:center; color: var(--text-light);">جاري تحميل المنتجات...</div>';
                }
                return '<div style="padding:10px; text-align:center; color: var(--text-light);">لا توجد منتجات تطابق بحثك</div>';
            }

            return productsToShow.map(product => `
                <div class="selector-item" onclick="addProductToElement(${elementIndex}, ${product.id})">
                    <img src="${product.image}" alt="${product.name}" class="selector-item-image" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="selector-item-details">
                        <div class="selector-item-name">${product.name}</div>
                        <div class="selector-item-price">﷼ ${product.price.toFixed(2)}</div>
                    </div>
                    <button class="selector-item-add">
                        <i class="s-icon sicon-plus"></i> إضافة
                    </button>
                </div>
            `).join('');
        }

        function filterProducts(elementId, searchText) {
            const index = document.getElementById(elementId).getAttribute('data-element-index');
            const container = document.getElementById(`available-products-${elementId}`);
            container.innerHTML = renderAvailableProducts(elementId, index, searchText);
        }

        function updatePreview() {
            const packageName = document.getElementById('package-name').value || 'اسم الباقة';
            const packagePrice = document.getElementById('package-price').value || '0.00';
            
            document.getElementById('preview-title').textContent = packageName;
            document.getElementById('preview-price').textContent = `﷼ ${parseFloat(packagePrice).toFixed(2)}`;

            const previewImage = document.getElementById('preview-package-image');
            if (packageImageUrl) {
                previewImage.src = packageImageUrl;
                previewImage.classList.add('visible');
            } else {
                previewImage.classList.remove('visible');
            }

            const previewElements = document.getElementById('preview-elements');
            
            if (packageElements.length === 0) {
                previewElements.innerHTML = `
                    <div style="text-align: center; color: var(--text-light); padding: 20px; font-size: 12px;">
                        قم بإضافة عناصر للباقة لمشاهدة المعاينة
                    </div>
                `;
                return;
            }

            previewElements.innerHTML = packageElements.map((element, index) => {
                if (element.products.length === 0) return '';

                return `
                    <div class="preview-element">
                        <div class="preview-element-header">
                            <div class="preview-element-number">${index + 1}</div>
                            <span>${element.name || `العنصر ${index + 1}`}</span>
                        </div>
                        <div class="preview-products">
                            ${element.products.map(product => `
                                <div class="preview-product">
                                    <img src="${product.image}" alt="${product.name}" class="preview-product-image">
                                    <div class="preview-product-details">
                                        <div class="preview-product-name">${product.name}</div>
                                        <div class="preview-product-price">﷼ ${product.price.toFixed(2)}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function addProductToElement(elementIndex, productId) {
            const product = availableProducts.find(p => p.id === productId);
            if (!product) return;

            const exists = packageElements[elementIndex].products.some(p => p.id === productId);
            if (exists) {
                alert('هذا المنتج مضاف بالفعل لهذا العنصر');
                return;
            }

            packageElements[elementIndex].products.push(product);
            
            const element = packageElements[elementIndex];
            const elementId = element.id;
            
            updateProductsList(elementId, elementIndex);
            updatePreview();
        }

        function updateProductsList(elementId, elementIndex) {
            const element = packageElements[elementIndex];
            const container = document.getElementById(`products-list-${elementId}`);
            
            if (element.products.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; color: var(--text-light); padding: 20px; font-size: 13px;">
                        لم يتم إضافة منتجات بعد
                    </div>
                `;
                return;
            }

            container.innerHTML = element.products.map((product, pIndex) => `
                <div class="product-item">
                    <img src="${product.image}" alt="${product.name}" class="product-image">
                    <div class="product-details">
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">﷼ ${product.price.toFixed(2)}</div>
                    </div>
                    <div class="product-remove" onclick="removeProductFromElement(${elementIndex}, ${pIndex})">
                        <i class="s-icon sicon-cancel"></i>
                    </div>
                </div>
            `).join('');
        }

        function removeProductFromElement(elementIndex, productIndex) {
            packageElements[elementIndex].products.splice(productIndex, 1);
            const element = packageElements[elementIndex];
            updateProductsList(element.id, elementIndex);
            updatePreview();
        }

        function updateElementName(elementIndex, name) {
            packageElements[elementIndex].name = name;
            updatePreview();
        }

        function removeElement(elementId, elementIndex) {
            if (confirm('هل أنت متأكد من حذف هذا العنصر وجميع منتجاته؟')) {
                packageElements.splice(elementIndex, 1);
                document.getElementById(elementId).remove();
                renumberElements();
                updatePreview();
            }
        }

        function renumberElements() {
            const elements = document.querySelectorAll('.element-card');
            elements.forEach((el, index) => {
                const number = el.querySelector('.element-number');
                if (number) number.textContent = index + 1;
                el.setAttribute('data-element-index', index);
            });
        }

        function toggleCollapsible(header) {
            const body = header.nextElementSibling;
            if (header.classList.contains('collapsed')) {
                header.classList.remove('collapsed');
                body.classList.remove('collapsed');
            } else {
                header.classList.add('collapsed');
                body.classList.add('collapsed');
            }
        }

        function savePackage() {
            const packageName = document.getElementById('package-name').value;
            const packagePrice = document.getElementById('package-price').value;

            if (!packageName) {
                alert('يرجى إدخال اسم الباقة');
                return;
            }

            if (!packagePrice || parseFloat(packagePrice) <= 0) {
                alert('يرجى إدخال سعر صحيح للباقة');
                return;
            }

            if (packageElements.length === 0) {
                alert('يرجى إضافة عنصر واحد على الأقل للباقة');
                return;
            }

            const hasEmptyElement = packageElements.some(e => e.products.length === 0);
            if (hasEmptyElement) {
                alert('يوجد عناصر بدون منتجات. يرجى إضافة منتجات لجميع العناصر');
                return;
            }

            const packageData = {
                name: packageName,
                price: parseFloat(packagePrice),
                elements: packageElements,
                active: document.getElementById('package-active').checked,
                featured: document.getElementById('package-featured').checked
            };

            console.log('بيانات الباقة:', packageData);
            
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="s-icon sicon-loading sicon-is-spinning"></i> جاري الحفظ...';
            btn.disabled = true;

            setTimeout(() => {
                btn.innerHTML = '<i class="s-icon sicon-check-circle"></i> تم الحفظ بنجاح';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }, 2000);
            }, 1500);
        }

        function previewPackage() {
            const packageName = document.getElementById('package-name').value || 'اسم الباقة';
            const packagePrice = document.getElementById('package-price').value || '0.00';
            
            let previewHTML = `
<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.salla.network/fonts/sallaicons.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f9fafb; padding: 40px 20px; }
        .s-icon { font-family: 'sallaicons' !important; font-style: normal; vertical-align: middle; }
        .preview-container { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .package-image { width: 100%; height: 300px; object-fit: cover; background: #e5e7eb; }
        .package-header { padding: 30px; text-align: center; border-bottom: 2px solid #e5e7eb; }
        .package-badge { background: #62D0B6; color: white; padding: 6px 16px; border-radius: 20px; font-size: 13px; display: inline-block; margin-bottom: 12px; font-weight: 600; }
        .package-title { font-size: 28px; font-weight: 700; color: #2d3748; margin-bottom: 12px; }
        .package-price { font-size: 36px; font-weight: 700; color: #62D0B6; }
        .package-elements { padding: 30px; }
        .element-section { margin-bottom: 30px; }
        .element-title { font-size: 18px; font-weight: 700; color: #2d3748; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .element-number { background: #62D0B6; color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .products-grid { display: grid; gap: 12px; }
        .product-option { display: flex; align-items: center; gap: 12px; padding: 16px; border: 2px solid #e5e7eb; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .product-option:hover { border-color: #62D0B6; background: #e8f7f3; }

        .product-info { flex: 1; }
        .product-name { font-size: 15px; font-weight: 600; color: #2d3748; margin-bottom: 4px; }
        .product-price-tag { font-size: 14px; color: #62D0B6; font-weight: 600; }
        .add-to-cart { background: #62D0B6; color: white; border: none; padding: 16px 32px; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 30px; font-family: 'Tajawal', sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .add-to-cart:hover { background: #4fc1a6; }
    </style>
</head>
<body>
    <div class="preview-container">
        ${packageImageUrl ? `<img src="${packageImageUrl}" alt="${packageName}" class="package-image">` : ''}
        <div class="package-header">
            <div class="package-badge"><i class="s-icon sicon-box-bankers"></i> باقة مخصصة</div>
            <h1 class="package-title">${packageName}</h1>
            <div class="package-price">﷼ ${parseFloat(packagePrice).toFixed(2)}</div>
        </div>
        <div class="package-elements">
            ${packageElements.map((el, i) => `
                <div class="element-section">
                    <div class="element-title">
                        <div class="element-number">${i+1}</div>
                        <span>${el.name || `العنصر ${i+1}`}</span>
                    </div>
                    <div class="products-grid">
                        ${el.products.map((p, pi) => `
                            <label class="product-option">
                                <input type="radio" name="el-${i}" class="product-radio" ${pi===0?'checked':''}>
                                <img src="${p.image}" class="product-image-small">
                                <div class="product-info">
                                    <div class="product-name">${p.name}</div>
                                    <div class="product-price-tag">﷼ ${p.price.toFixed(2)}</div>
                                </div>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('')}
            <button class="add-to-cart">
                <i class="s-icon sicon-cart"></i>
                أضف إلى السلة
            </button>
        </div>
    </div>
</body>
</html>`;
            const previewWindow = window.open('', '_blank', 'width=700,height=900');
            previewWindow.document.write(previewHTML);
            previewWindow.document.close();
        }

        window.addEventListener('load', () => {});
    </script>
</body>
</html>
